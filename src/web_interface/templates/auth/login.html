{% extends "layout.html" %}

{% block title %}Login - Intraday Statistical Arbitrage System{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center">
                    <h4 class="my-2"><i class="fas fa-chart-line me-2"></i>Quant Trader</h4>
                </div>
                <div class="card-body">
                    <h5 class="card-title text-center mb-4">Log In</h5>
                    <form method="POST" action="{{ url_for('auth.login') }}">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-user"></i></span>
                                <input type="text" class="form-control" id="username" name="username" required autofocus>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>
                        </div>
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-sign-in-alt me-2"></i>Log In
                            </button>
                        </div>
                    </form>
                </div>
                <div class="card-footer text-center text-muted">
                    <small>Intraday Statistical Arbitrage System</small>
                </div>
            </div>
            <div class="mt-3 text-center text-muted">
                <small>Default credentials: admin / admin</small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
