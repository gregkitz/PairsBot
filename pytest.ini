[pytest]
markers =
    unit: marks tests as unit tests
    integration: marks tests as integration tests
    slow: marks tests as slow (skip during quick runs)
    external: marks tests that require external connections

python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts = --strict-markers --verbosity=2

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning 